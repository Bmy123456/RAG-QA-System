server:
  host: "0.0.0.0"
  port: 8000
  secret_key: ${SECRET_KEY}

llm:
  provider: deepseek
  api_key: ${DEEPSEEK_API_KEY}
  base_url: https://api.deepseek.com/v1
  model: deepseek-chat

embedding:
  provider: deepseek
  api_key: ${DEEPSEEK_API_KEY}
  base_url: https://api.deepseek.com/v1
  model: deepseek-embed

reranker:
  provider: local
  model: BAAI/bge-reranker-base

vector_store:
  type: chromadb
  persist_dir: data/chroma

document:
  chunk_size: 500
  chunk_overlap: 50
  max_file_size_mb: 50

retrieval:
  coarse_top_k: 20
  rerank_top_k: 5
  similarity_threshold: 0.5

database:
  url: sqlite:///data/rag.db
